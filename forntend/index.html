<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Rental - Quản lý chuyên nghiệp</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #3498db;
            --success: #2ecc71;
            --warning: #f1c40f;
            --danger: #e74c3c;
            --light: #f4f7f6;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { display: flex; background: var(--light); height: 100vh; overflow: hidden; }

        /* Sidebar Sidebar */
        #sidebar { 
            width: 260px; 
            background: var(--primary); 
            color: var(--white); 
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }

        #sidebar h2 { 
            font-size: 1.5rem; 
            margin-bottom: 40px; 
            text-align: center;
            letter-spacing: 1px;
        }

        .nav-item { 
            padding: 14px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            margin-bottom: 8px; 
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            font-weight: 500;
            color: rgba(255,255,255,0.8);
        }

        .nav-item:hover { 
            background: var(--secondary); 
            color: var(--white);
            transform: translateX(5px);
        }

        .nav-item.active { 
            background: var(--accent); 
            color: var(--white);
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
        }

        /* Main Content */
        #main { flex: 1; padding: 40px; overflow-y: auto; scroll-behavior: smooth; }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 35px;
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
        }

        .header h1 { color: var(--primary); font-size: 1.8rem; }

        /* Grid & Cards */
        .room-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
        }

        .card { 
            background: var(--white); 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.05); 
            border-top: 6px solid var(--accent); 
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover { 
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.1);
        }

        .card-id { font-size: 0.75rem; color: #95a5a6; text-transform: uppercase; margin-bottom: 10px; }
        .card h3 { color: var(--primary); margin-bottom: 12px; font-size: 1.3rem; }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .status-available { background: #e8f8f0; color: var(--success); }
        .status-occupied { background: #ebf5fb; color: var(--accent); }

        .price { color: var(--danger); font-weight: 800; font-size: 1.4rem; margin-bottom: 20px; }

        /* Buttons */
        .btn { 
            padding: 10px 20px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600; 
            transition: all 0.2s; 
            font-size: 0.9rem;
        }

        .btn-add { background: var(--success); color: var(--white); box-shadow: 0 4px 10px rgba(46, 204, 113, 0.2); }
        .btn-add:hover { background: #27ae60; transform: scale(1.05); }

        .btn-edit { background: var(--warning); color: var(--white); margin-right: 8px; }
        .btn-edit:hover { background: #f39c12; }

        .btn-del { background: var(--danger); color: var(--white); }
        .btn-del:hover { background: #c0392b; }

        /* Modal */
        #modal,
        #detailModal { 
            display:none; 
            position:fixed; 
            top:0; left:0; 
            width:100%; height:100%; 
            background:rgba(44, 62, 80, 0.8); 
            justify-content:center; 
            align-items:center; 
            z-index: 9999;
            backdrop-filter: blur(4px);
        }

        .modal-box { 
            background: var(--white); 
            padding: 35px; 
            border-radius: 20px; 
            width: 420px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: modalIn 0.3s ease-out;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        label { display: block; margin-top: 15px; font-weight: 600; color: var(--secondary); font-size: 0.9rem; }
        input, select { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border: 1.5px solid #ddd; 
            border-radius: 10px; 
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus, select:focus { border-color: var(--accent); }

        .modal-actions { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; }
    </style>
</head>
<body>
    <div id="sidebar">
        <div style="background: var(--primary); padding: 15px; border-radius: 10px; margin-bottom: 40px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.2);">
            <img src="./logo.jpg" alt="Smart Rental Logo" style="width: 100%; max-width: 180px; border-radius: 5px;">
        </div>
        <div class="nav-item active" onclick="switchTab('rooms', this)">📋 Quản lý phòng</div>
        <div class="nav-item" onclick="switchTab('services', this)">⚡ Dịch vụ tiện ích</div>
        <div class="nav-item" onclick="switchTab('contracts', this)">📜 Hợp đồng thuê</div>
        <div class="nav-item" onclick="switchTab('users', this)">👤 Người dùng hệ thống</div>
        <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.3);">
            <div id="userInfo" style="font-size: 0.9rem; color: #bdc3c7; margin-bottom: 10px;">
                <span id="currentUser">Chưa đăng nhập</span>
            </div>
            <button class="btn btn-del" onclick="logout()" style="width: 100%; padding: 10px;">🚪 Đăng xuất</button>
            <button class="btn btn-add" onclick="openLoginModal()" style="width: 100%; padding: 10px; margin-top: 8px;" id="loginBtn">🔐 Đăng nhập</button>
        </div>
    </div>

    <div id="main">
        <div class="header">
            <h1 id="page-title">Danh sách phòng trọ</h1>
            <button class="btn btn-add" id="btn-main-add" onclick="openModal()">+ Thêm mới</button>
        </div>
        <div id="room-container" class="room-grid"></div>
    </div>

    <div id="modal">
        <div class="modal-box" id="modal-content">
            <h3 id="modal-title" style="margin-bottom: 20px; color: var(--primary);">Thông tin</h3>
            <div id="modal-form"></div>
            <div class="modal-actions">
                <button class="btn btn-add" style="padding: 14px;" id="modal-submit-button" onclick="submitModal()">Lưu thông tin</button>
                <button class="btn" style="background:#bdc3c7; color:white; padding: 14px;" onclick="closeModal()">Hủy bỏ</button>
            </div>
        </div>
    </div>

    <div id="loginModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(44, 62, 80, 0.8); justify-content:center; align-items:center; z-index: 10000; backdrop-filter: blur(4px);">
        <div class="modal-box" style="width: 350px;">
            <h3 style="margin-bottom: 20px; color: var(--primary);">🔐 Đăng nhập</h3>
            <label>Tên đăng nhập</label>
            <input type="text" id="loginUsername" placeholder="admin">
            <label>Mật khẩu</label>
            <input type="password" id="loginPassword" placeholder="123456">
            <div class="modal-actions">
                <button class="btn btn-add" style="padding: 14px;" onclick="performLogin()">Đăng nhập</button>
                <button class="btn" style="background:#bdc3c7; color:white; padding: 14px;" onclick="closeLoginModal()">Hủy</button>
            </div>
        </div>
    </div>

    <div id="detailModal">
        <div class="modal-box" id="detail-content">
            <h3 id="detail-title" style="margin-bottom: 20px; color: var(--primary);">Chi tiết</h3>
            <div id="detail-body"></div>
            <div class="modal-actions">
                <button class="btn" style="background:#bdc3c7; color:white; padding: 14px;" onclick="closeDetail()">Đóng</button>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = "http://localhost:5000/api";
        let currentTab = 'rooms';
        window.roomsCache = [];
        let adminRole = localStorage.getItem('userRole') || '';
        let authToken = localStorage.getItem('authToken') || '';
        let currentUsername = localStorage.getItem('username') || '';

        window.onload = () => {
            console.log("✅ Ứng dụng đã load. Kết nối đến:", BASE_URL);
            updateUserDisplay();
            loadData();
        };

        function updateUserDisplay() {
            const userInfo = document.getElementById('currentUser');
            const loginBtn = document.getElementById('loginBtn');
            if (adminRole === 'admin') {
                userInfo.innerHTML = `✅ <b>${currentUsername || 'Admin'}</b> - Có quyền quản lý`;
                loginBtn.style.display = 'none';
            } else if (authToken) {
                userInfo.innerHTML = `👁️ <b>${currentUsername || 'Người dùng'}</b> - Chỉ xem dữ liệu`;
                loginBtn.style.display = 'none';
            } else {
                userInfo.innerHTML = '👁️ <b>Xem</b> - Chỉ quyền xem';
                loginBtn.style.display = 'block';
            }
        }

        function openLoginModal() {
            document.getElementById('loginModal').style.display = 'flex';
        }

        function closeLoginModal() {
            document.getElementById('loginModal').style.display = 'none';
        }

        async function performLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            if (!username || !password) {
                alert('❌ Hãy nhập tên đăng nhập và mật khẩu');
                return;
            }

            try {
                const response = await fetch(`${BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Đăng nhập thất bại');
                }

                const data = await response.json();
                authToken = data.token || '';
                currentUsername = data.username || username;
                adminRole = data.role === 'admin' ? 'admin' : '';
                localStorage.setItem('authToken', authToken);
                localStorage.setItem('userRole', adminRole);
                localStorage.setItem('username', currentUsername);
                updateUserDisplay();
                closeLoginModal();
                alert(`✅ Đã đăng nhập thành công! Quyền: ${data.role}`);
                loadData();
            } catch (err) {
                alert('❌ Lỗi đăng nhập: ' + err.message);
            }
        }

        function logout() {
            adminRole = '';
            authToken = '';
            currentUsername = '';
            localStorage.removeItem('userRole');
            localStorage.removeItem('authToken');
            localStorage.removeItem('username');
            updateUserDisplay();
            location.reload();
        }

        function getHeaders(isJson = true) {
            const headers = {};
            if (isJson) headers['Content-Type'] = 'application/json';
            if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
            return headers;
        }

        async function switchTab(tab, element) {
            currentTab = tab;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            
            const titles = { 
                'rooms': 'Quản lý phòng trọ', 
                'services': 'Dịch vụ & Tiện ích', 
                'contracts': 'Hợp đồng thuê phòng', 
                'users': 'Quản trị người dùng' 
            };
            document.getElementById('page-title').innerText = titles[tab];
            document.getElementById('btn-main-add').innerText = tab === 'rooms' ? '+ Thêm mới' : tab === 'services' ? '+ Thêm dịch vụ' : tab === 'contracts' ? '+ Thêm hợp đồng' : '+ Thêm người dùng';
            loadData();
        }

        async function loadData() {
            const container = document.getElementById('room-container');
            container.innerHTML = "<p style='color: #7f8c8d;'>⏳ Đang tải dữ liệu...</p>";

            if (currentTab === 'users' && !authToken) {
                container.innerHTML = `<div style='color: #d35400; font-weight: bold; padding: 20px; background: #fff3cd; border-radius: 10px;'>⚠️ Chức năng chỉ dành cho Admin.<br><small>Vui lòng đăng nhập để xem danh sách người dùng.</small></div>`;
                return;
            }

            try {
                const url = `${BASE_URL}/${currentTab}`;
                console.log("🔄 Gọi API:", url);
                const res = await fetch(url, { headers: getHeaders() });
                if (!res.ok) {
                    if (currentTab === 'users' && (res.status === 401 || res.status === 403)) {
                        throw new Error('Bạn cần đăng nhập admin để xem danh sách người dùng.');
                    }
                    throw new Error(`HTTP ${res.status}: ${res.statusText}`);
                }
                const data = await res.json();
                console.log("✅ Dữ liệu nhận được:", data);

                if (currentTab === 'rooms') {
                    try {
                        const services = await fetch(`${BASE_URL}/services`, { headers: getHeaders() }).then(r => r.ok ? r.json() : []);
                        window.roomsCache = data;
                        renderRooms(data, services);
                    } catch (err) {
                        console.error("❌ Lỗi tải dịch vụ:", err);
                        container.innerHTML = `<div style='color: var(--danger); font-weight: bold; padding: 20px; background: #ffe8e8; border-radius: 10px;'>⚠️ Lỗi kết nối!<br><small>Chi tiết: ${err.message}</small></div>`;
                    }
                } else if (currentTab === 'services') {
                    renderServices(data);
                } else if (currentTab === 'contracts') {
                    renderContracts(data);
                } else if (currentTab === 'users') {
                    renderUsers(data);
                }
            } catch (err) {
                console.error("❌ Lỗi:", err);
                container.innerHTML = `<div style='color: var(--danger); font-weight: bold; padding: 20px; background: #ffe8e8; border-radius: 10px;'>⚠️ Lỗi kết nối!<br><small>Chi tiết: ${err.message}</small><br><small>Hãy chắc chắn Backend đang chạy tại ${BASE_URL}</small></div>`;
            }
        }

        function renderRooms(data, services) {
            const container = document.getElementById('room-container');
            if (!data || data.length === 0) {
                container.innerHTML = "<p>Danh sách trống. Hãy thêm phòng đầu tiên!</p>";
                return;
            }

            // Create services map for quick lookup
            const servicesMap = new Map(services.map(s => [s._id, s]));

            container.innerHTML = data.map(r => {
                let totalPrice = Number(r.price);
                let servicesHtml = '';

                // Calculate services for this room
                const roomServiceIds = (r.services || []).map(serviceId => {
                    if (serviceId && typeof serviceId === 'object') {
                        return String(serviceId._id || serviceId);
                    }
                    return String(serviceId);
                });
                const roomServices = services.filter(s => roomServiceIds.includes(String(s._id)));

                if (roomServices.length > 0) {
                    servicesHtml = '<div style="margin-top: 8px; font-size: 0.85rem; color: #666;"><b>Dịch vụ:</b> ';
                    servicesHtml += roomServices.map(s => `${s.name} (+${Number(s.price).toLocaleString()}đ)`).join(', ');
                    servicesHtml += '</div>';
                    roomServices.forEach(s => totalPrice += Number(s.price));
                }

                return `
                    <div class="card">
                        <div class="card-id">ID: ${r._id.slice(-6)}</div>
                        ${r.image ? `<img src="http://localhost:5000${r.image}" style="width:100%; border-radius:10px; margin-bottom:10px; height:150px; object-fit:cover;" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect fill=%22%23ddd%22 width=%22100%22 height=%22100%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2216%22 fill=%22%23999%22%3ENo Image%3C/text%3E%3C/svg%3E'">` : ''}
                        <h3>Phòng ${r.roomNumber}</h3>
                        <span class="status-badge ${r.status === 'Available' ? 'status-available' : 'status-occupied'}">
                            ${r.status === 'Available' ? '✨ Còn trống' : '👤 Đã thuê'}
                        </span>
                        <div class="price">${Number(r.price).toLocaleString()} <small>đ/tháng</small></div>
                        ${servicesHtml}
                        <div style="margin-top: 10px; padding: 8px; background: #e8f5e9; border-radius: 5px; font-weight: bold; color: var(--danger);">
                            💰 Tổng: ${totalPrice.toLocaleString()} đ/tháng
                        </div>
                        <div style="display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px;">
                            <button class="btn btn-add" onclick="openRoomDetail('${r._id}')">Xem chi tiết</button>
                            ${adminRole === 'admin' ? `<button class="btn btn-edit" onclick="editRoom('${r._id}','${r.roomNumber}','${r.price}','${r.status}')">Sửa</button>
                            <button class="btn btn-del" onclick="deleteRoom('${r._id}')">Xóa</button>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderServices(data) {
            const container = document.getElementById('room-container');
            if (!data || data.length === 0) {
                container.innerHTML = "<p style='text-align:center;'>Chưa có dịch vụ nào. Nhấn Thêm mới!</p>";
                return;
            }

            const total = data.reduce((sum, item) => sum + Number(item.price || 0), 0);
            const count = data.length;
            const summary = `
                <div class="card" style="border-top-color: #27ae60; background: #ecf9f1;">
                    <h3>Tổng dịch vụ: ${count}</h3>
                    <p>Tổng giá trị: <strong>${total.toLocaleString()} đ</strong></p>
                </div>
            `;

            container.innerHTML = summary + data.map(s => `
                <div class="card" style="border-top-color: #2ecc71;">
                    <div class="card-id">ID: ${s._id.slice(-6)}</div>
                    <h3>${s.name}</h3>
                    <div class="price">${Number(s.price).toLocaleString()} <small>đ / ${s.unit || 'đv'}</small></div>
                    <div style="display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px;">
                        ${adminRole === 'admin' ? `<button class="btn btn-del" onclick="deleteService('${s._id}')">Xóa</button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function formatDate(value) {
            if (!value) return '---';
            const date = new Date(value);
            return date.toLocaleDateString('vi-VN');
        }

        function renderContracts(data) {
            const container = document.getElementById('room-container');
            if (!data || data.length === 0) { container.innerHTML = "<p>Chưa có hợp đồng nào.</p>"; return; }
            
            // Load rooms and services data for calculation
            Promise.all([
                fetch(`${BASE_URL}/rooms`).then(r => r.ok ? r.json() : []),
                fetch(`${BASE_URL}/services`).then(r => r.ok ? r.json() : [])
            ]).then(([rooms, services]) => {
                const roomsMap = new Map(rooms.map(r => [r._id, r]));
                const servicesMap = new Map(services.map(s => [s._id, s]));
                
                container.innerHTML = data.map(c => {
                    const room = roomsMap.get(c.roomID?._id || c.roomID);
                    let monthlyTotal = 0;
                    
                    if (room) {
                        monthlyTotal = Number(room.price || 0);
                        // Add services assigned to this room
                        if (room.services && room.services.length > 0) {
                            room.services.forEach(serviceId => {
                                const key = typeof serviceId === 'object' ? String(serviceId._id || serviceId) : String(serviceId);
                                const service = servicesMap.get(key);
                                if (service) {
                                    monthlyTotal += Number(service.price || 0);
                                }
                            });
                        }
                    }
                    
                    return `
                        <div class="card" style="border-top-color: #f1c40f;">
                            <div class="card-id">HĐ: ${c._id.slice(-6)}</div>
                            <h3>Phòng: ${room?.roomNumber || '---'}</h3>
                            <p><b>Khách:</b> ${c.customerName || 'Chưa rõ'}</p>
                            <p><b>Cọc:</b> ${c.deposit ? Number(c.deposit).toLocaleString() + ' đ' : '---'}</p>
                            <p><b>Thời gian:</b> ${formatDate(c.startDate)} - ${formatDate(c.endDate)}</p>
                            <p style="background: #fff3cd; padding: 8px; border-radius: 5px; margin-top: 10px;">
                                <b>💰 Phải trả/tháng:</b> <span style="color: var(--danger); font-size: 1.1rem; font-weight: bold;">${monthlyTotal.toLocaleString()} đ</span>
                            </p>
                            <div style="display: flex; gap: 5px; flex-wrap: wrap; margin-top: 15px;">
                                ${adminRole === 'admin' ? `<button class="btn btn-edit" onclick="returnRoom('${c._id}')">Trả phòng</button>
                                <button class="btn btn-del" onclick="deleteContract('${c._id}')">Xóa hợp đồng</button>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
            }).catch(err => {
                console.error('Lỗi tải dữ liệu cho hợp đồng:', err);
                // Fallback render without calculations
                container.innerHTML = data.map(c => `
                    <div class="card" style="border-top-color: #f1c40f;">
                        <div class="card-id">HĐ: ${c._id.slice(-6)}</div>
                        <h3>Phòng: ${c.roomID?.roomNumber || '---'}</h3>
                        <p><b>Khách:</b> ${c.customerName || 'Chưa rõ'}</p>
                        <p><b>Cọc:</b> ${c.deposit ? Number(c.deposit).toLocaleString() + ' đ' : '---'}</p>
                        <p><b>Thời gian:</b> ${formatDate(c.startDate)} - ${formatDate(c.endDate)}</p>
                        <div style="display: flex; gap: 5px; flex-wrap: wrap; margin-top: 15px;">
                            ${adminRole === 'admin' ? `<button class="btn btn-edit" onclick="returnRoom('${c._id}')">Trả phòng</button>
                            <button class="btn btn-del" onclick="deleteContract('${c._id}')">Xóa hợp đồng</button>` : ''}
                        </div>
                    </div>
                `).join('');
            });
        }

        function renderUsers(data) {
            const container = document.getElementById('room-container');
            if (!data || data.length === 0) { container.innerHTML = "<p>Chưa có người dùng nào.</p>"; return; }
            container.innerHTML = data.map(u => `
                <div class="card" style="border-top-color: #9b59b6;">
                    <div class="card-id">USER: ${u._id.slice(-6)}</div>
                    <h3>${u.fullName || u.username}</h3>
                    <p><b>Tên đăng nhập:</b> ${u.username}</p>
                    <span class="status-badge status-occupied">${u.role === 'admin' ? '⭐ Admin' : '👤 User'}</span>
                    <div style="display: flex; gap: 5px; flex-wrap: wrap; margin-top: 15px;">
                        ${adminRole === 'admin' ? `<button class="btn btn-del" onclick="deleteUser('${u._id}')">Xóa</button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        async function fetchRoomById(id) {
            const res = await fetch(`${BASE_URL}/rooms/${id}`);
            if (!res.ok) throw new Error('Không tải được chi tiết phòng.');
            return res.json();
        }

        async function fetchContractsByRoom(roomId) {
            const res = await fetch(`${BASE_URL}/contracts`);
            if (!res.ok) return [];
            const allContracts = await res.json();
            return allContracts.filter(c => c.roomID && c.roomID._id === roomId);
        }

        async function fetchServices() {
            const res = await fetch(`${BASE_URL}/services`);
            if (!res.ok) return [];
            return res.json();
        }

        async function openRoomDetail(id) {
            try {
                const room = await fetchRoomById(id);
                const contracts = await fetchContractsByRoom(id);
                const allServices = await fetchServices();
                
                let totalPrice = Number(room.price) || 0;
                
                // Normalize room service ids and get matching services
                const roomServiceIds = (room.services || []).map(serviceId => {
                    if (serviceId && typeof serviceId === 'object') {
                        return String(serviceId._id || serviceId);
                    }
                    return String(serviceId);
                });
                
                const roomServices = allServices.filter(s => {
                    const serviceId = String(s._id);
                    return roomServiceIds.includes(serviceId);
                });
                
                let servicesHtml = '';
                if (roomServices.length > 0) {
                    servicesHtml = '<div><b>Dịch vụ tính phí:</b><ul style="margin: 10px 0; padding-left: 20px;">';
                    roomServices.forEach(s => {
                        const servicePrice = Number(s.price) || 0;
                        totalPrice += servicePrice;
                        servicesHtml += `<li>${s.name}: ${Number(s.price).toLocaleString()} đ/${s.unit}</li>`;
                    });
                    servicesHtml += '</ul></div>';
                } else {
                    servicesHtml = '<p><b>Dịch vụ tính phí:</b> không có</p>';
                }

                let contractsHtml = '';
                if (contracts.length > 0) {
                    contractsHtml = `
                        <div style="margin-top: 20px; padding: 15px; background: #fff3cd; border-radius: 8px; border-left: 4px solid #f1c40f;">
                            <h4 style="margin: 0 0 10px 0; color: #8b4513;">📜 Hợp đồng hiện tại</h4>
                    `;
                    contracts.forEach(c => {
                        contractsHtml += `
                            <div style="background: white; padding: 12px; border-radius: 6px; margin-bottom: 8px; border: 1px solid #ddd;">
                                <p style="margin: 5px 0;"><b>👤 Khách thuê:</b> ${c.customerName}</p>
                                <p style="margin: 5px 0;"><b>💰 Tiền cọc:</b> ${Number(c.deposit).toLocaleString()} đ</p>
                                <p style="margin: 5px 0;"><b>📅 Thời gian:</b> ${formatDate(c.startDate)} → ${formatDate(c.endDate)}</p>
                                <p style="margin: 5px 0;"><b>🏷️ Trạng thái:</b> <span style="color: #27ae60; font-weight: bold;">Đang thuê</span></p>
                            </div>
                        `;
                    });
                    contractsHtml += '</div>';
                } else {
                    contractsHtml = `
                        <div style="margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px; border-left: 4px solid #6c757d;">
                            <p style="margin: 0; color: #6c757d;"><b>📜 Hợp đồng:</b> Phòng chưa có hợp đồng thuê</p>
                        </div>
                    `;
                }
                
                document.getElementById('detail-title').innerText = `Chi tiết phòng ${room.roomNumber}`;
                document.getElementById('detail-body').innerHTML = `
                    ${room.image ? `<img src="http://localhost:5000${room.image}" style="width:100%; border-radius:12px; margin-bottom:16px; object-fit:cover; height:220px;">` : ''}
                    <p><b>Số phòng:</b> ${room.roomNumber}</p>
                    <p><b>Giá thuê cơ bản:</b> <span style="color: var(--danger); font-weight: bold;">${Number(room.price).toLocaleString()} đ/tháng</span></p>
                    <p><b>Trạng thái:</b> ${room.status}</p>
                    ${servicesHtml}
                    <p style="font-size: 1.1rem; background: #e8f5e9; padding: 12px; border-radius: 8px; margin-top: 15px;">
                        <b>💰 Tổng cộng/tháng:</b> <span style="color: var(--danger); font-size: 1.3rem;">${totalPrice.toLocaleString()} đ</span>
                    </p>
                    ${contractsHtml}
                `;
                document.getElementById('detailModal').style.display = 'flex';
            } catch (err) {
                alert('Không thể tải chi tiết phòng: ' + err.message);
            }
        }

        async function openModal() {
            if (currentTab !== 'rooms' && adminRole !== 'admin') {
                alert('❌ Chỉ admin mới được thêm mới!');
                return;
            }

            const title = document.getElementById('modal-title');
            const form = document.getElementById('modal-form');
            document.getElementById('modal-submit-button').onclick = submitModal;
            document.getElementById('modal').style.display = 'flex';

            if (currentTab === 'rooms') {
                title.innerText = 'Thêm phòng mới';
                
                // Load services for selection
                let servicesHtml = '<div style="margin-top: 15px;"><label>Dịch vụ tiện ích (chọn nhiều):</label><div id="services-list" style="max-height: 200px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; margin-top: 5px; border-radius: 5px;">Đang tải dịch vụ...</div></div>';
                
                form.innerHTML = `
                    <input type="hidden" id="roomId">
                    <label>Số phòng</label>
                    <input type="text" id="num" placeholder="Ví dụ: 101, 202...">
                    <label>Giá thuê hàng tháng (VNĐ)</label>
                    <input type="number" id="prc" placeholder="Ví dụ: 3500000" oninput="updateTotalPreview()">
                    <label>Trạng thái phòng</label>
                    <select id="sts">
                        <option value="Available">✨ Còn trống (Available)</option>
                        <option value="Occupied">👤 Đã có khách (Occupied)</option>
                    </select>
                    <label>Hình ảnh phòng</label>
                    <input type="file" id="roomImage" accept="image/*">
                    ${servicesHtml}
                    <div id="total-preview" style="margin-top: 15px; padding: 12px; background: #e8f5e9; border-radius: 8px; display: none;">
                        <strong>💰 Tổng cộng/tháng: <span id="total-amount" style="color: var(--danger); font-size: 1.2rem;">0 đ</span></strong>
                    </div>
                `;
                
                // Load services after form is rendered
                loadServicesForRoomForm();
            } else if (currentTab === 'services') {
                title.innerText = 'Thêm dịch vụ mới';
                form.innerHTML = `
                    <label>Tên dịch vụ</label>
                    <input type="text" id="serviceName" placeholder="Ví dụ: Điện, Nước...">
                    <label>Giá dịch vụ (VNĐ)</label>
                    <input type="number" id="servicePrice" placeholder="Ví dụ: 35000">
                    <label>Đơn vị</label>
                    <input type="text" id="serviceUnit" placeholder="Ví dụ: kWh, m3...">
                `;
            } else if (currentTab === 'contracts') {
                title.innerText = 'Thêm hợp đồng mới';
                if (!window.roomsCache.length) {
                    window.roomsCache = await loadRoomOptions();
                }
                let roomOptions = `<option value="">Chọn phòng</option>`;
                roomOptions += window.roomsCache.map(r => `<option value="${r._id}">${r.roomNumber} - ${r.status}</option>`).join('');
                form.innerHTML = `
                    <label>Chọn phòng</label>
                    <select id="contractRoomId">${roomOptions}</select>
                    <label>Tên khách thuê</label>
                    <input type="text" id="customerName" placeholder="Ví dụ: Nguyen Van A">
                    <label>Ngày bắt đầu</label>
                    <input type="date" id="startDate">
                    <label>Ngày kết thúc</label>
                    <input type="date" id="endDate">
                    <label>Tiền đặt cọc (VNĐ)</label>
                    <input type="number" id="deposit" placeholder="Ví dụ: 500000">
                `;
            } else if (currentTab === 'users') {
                title.innerText = 'Thêm admin mới';
                form.innerHTML = `
                    <label>Tên đăng nhập</label>
                    <input type="text" id="username" placeholder="Ví dụ: admin01">
                    <label>Mật khẩu</label>
                    <input type="password" id="password" placeholder="Nhập mật khẩu">
                    <label>Họ và tên</label>
                    <input type="text" id="fullName" placeholder="Ví dụ: Nguyễn Văn A">
                    <label>Quyền</label>
                    <select id="role">
                        <option value="admin">Admin</option>
                        <option value="user">User</option>
                    </select>
                `;
            } else {
                title.innerText = 'Thêm mới';
                form.innerHTML = '<p>Chức năng chưa hỗ trợ.</p>';
            }
        }

        async function submitModal() {
            if (currentTab === 'rooms') {
                await saveRoom();
            } else if (currentTab === 'services') {
                await saveService();
            } else if (currentTab === 'contracts') {
                await saveContract();
            } else if (currentTab === 'users') {
                await saveUser();
            }
        }

        async function saveRoom() {
            const id = document.getElementById('roomId')?.value;
            const roomNumber = document.getElementById('num').value.trim();
            const price = document.getElementById('prc').value.trim();
            const status = document.getElementById('sts').value;
            const fileInput = document.getElementById('roomImage');

            if (!roomNumber || !price) {
                alert("❌ Hãy điền đầy đủ thông tin!");
                return;
            }

            // Collect selected services
            const selectedServices = [];
            const serviceCheckboxes = document.querySelectorAll('input[name="roomServices"]:checked');
            serviceCheckboxes.forEach(checkbox => {
                selectedServices.push(checkbox.value);
            });

            console.log('Selected services for save:', selectedServices);

            const formData = new FormData();
            formData.append('roomNumber', roomNumber);
            formData.append('price', price);
            formData.append('status', status);
            selectedServices.forEach(serviceId => {
                formData.append('services[]', serviceId);
            });
            if (fileInput && fileInput.files[0]) {
                formData.append('image', fileInput.files[0]);
            }

            const url = id ? `${BASE_URL}/rooms/${id}` : `${BASE_URL}/rooms`;
            const method = id ? 'PUT' : 'POST';

            try {
                const headers = getHeaders(false);
                const options = { method, body: formData, headers };
                const response = await fetch(url, options);
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || response.statusText);
                }
                const savedData = await response.json();
                console.log('Saved room data:', savedData);
                closeModal();
                loadData();
                alert('✅ Lưu phòng thành công!');
            } catch (e) {
                alert('❌ Lỗi server: ' + e.message);
            }
        }

        async function saveService() {
            const name = document.getElementById('serviceName').value.trim();
            const price = document.getElementById('servicePrice').value.trim();
            const unit = document.getElementById('serviceUnit').value.trim();

            if (!name || !price || !unit) {
                alert('❌ Hãy điền đầy đủ thông tin dịch vụ.');
                return;
            }

            try {
                const headers = getHeaders();
                const response = await fetch(`${BASE_URL}/services`, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({ name, price, unit })
                });
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || response.statusText);
                }
                closeModal();
                loadData();
                alert('✅ Thêm dịch vụ thành công!');
            } catch (e) {
                alert('❌ Lỗi server: ' + e.message);
            }
        }

        async function saveContract() {
            const roomID = document.getElementById('contractRoomId').value;
            const customerName = document.getElementById('customerName').value.trim();
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const deposit = document.getElementById('deposit').value.trim();

            if (!roomID || !customerName || !startDate) {
                alert('❌ Hãy điền đủ phòng, khách và ngày bắt đầu.');
                return;
            }

            try {
                const headers = getHeaders();
                const response = await fetch(`${BASE_URL}/contracts`, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({ roomID, customerName, startDate, endDate, deposit })
                });
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || response.statusText);
                }
                closeModal();
                loadData();
                alert('✅ Thêm hợp đồng thành công!');
            } catch (e) {
                alert('❌ Lỗi server: ' + e.message);
            }
        }

        async function saveUser() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const fullName = document.getElementById('fullName').value.trim();
            const role = document.getElementById('role').value;

            if (!username || !password || !fullName) {
                alert('❌ Hãy điền đầy đủ thông tin người dùng.');
                return;
            }

            try {
                const headers = getHeaders();
                const response = await fetch(`${BASE_URL}/users`, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({ username, password, fullName, role })
                });
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || response.statusText);
                }
                closeModal();
                loadData();
                alert('✅ Thêm người dùng thành công!');
            } catch (e) {
                alert('❌ Lỗi server: ' + e.message);
            }
        }

        async function deleteService(id) {
            if (!confirm('Xác nhận xóa dịch vụ này?')) return;
            try {
                const headers = getHeaders();
                const response = await fetch(`${BASE_URL}/services/${id}`, { method: 'DELETE', headers });
                if (!response.ok) throw new Error('Không xóa được dịch vụ');
                loadData();
                alert('✅ Đã xóa dịch vụ!');
            } catch (e) {
                alert('❌ Lỗi xóa dịch vụ: ' + e.message);
            }
        }

        async function returnRoom(id) {
            if (!confirm('Xác nhận trả phòng và xóa hợp đồng?')) return;
            try {
                const headers = getHeaders();
                const response = await fetch(`${BASE_URL}/contracts/${id}/return`, { method: 'PUT', headers });
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || response.statusText);
                }
                loadData();
                alert('✅ Trả phòng thành công!');
            } catch (e) {
                alert('❌ Lỗi trả phòng: ' + e.message);
            }
        }

        async function deleteContract(id) {
            if (!confirm('Xác nhận xóa hợp đồng này?')) return;
            try {
                const headers = getHeaders();
                const response = await fetch(`${BASE_URL}/contracts/${id}`, { method: 'DELETE', headers });
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || response.statusText);
                }
                loadData();
                alert('✅ Đã xóa hợp đồng!');
            } catch (e) {
                alert('❌ Lỗi xóa hợp đồng: ' + e.message);
            }
        }

        async function deleteUser(id) {
            if (!confirm('Xác nhận xóa người dùng này?')) return;
            try {
                const headers = getHeaders();
                const response = await fetch(`${BASE_URL}/users/${id}`, { method: 'DELETE', headers });
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || response.statusText);
                }
                loadData();
                alert('✅ Đã xóa người dùng!');
            } catch (e) {
                alert('❌ Lỗi xóa người dùng: ' + e.message);
            }
        }

        function editRoom(id, num, prc, sts) {
            openModal();
            document.getElementById('modal-title').innerText = "Cập nhật phòng " + num;
            document.getElementById('roomId').value = id;
            document.getElementById('num').value = num;
            document.getElementById('prc').value = prc;
            document.getElementById('sts').value = sts;
            
            // Load services and pre-select current room services
            loadServicesForRoomForm().then(() => {
                // Fetch current room data to get selected services
                fetch(`${BASE_URL}/rooms/${id}`)
                    .then(res => res.json())
                    .then(room => {
                        if (room.services && room.services.length > 0) {
                            room.services.forEach(serviceId => {
                                const checkbox = document.querySelector(`input[name="roomServices"][value="${serviceId}"]`);
                                if (checkbox) {
                                    checkbox.checked = true;
                                }
                            });
                        }
                        // Update total after loading services
                        updateTotalPreview();
                    })
                    .catch(err => console.error('Lỗi tải dữ liệu phòng:', err));
            });
        }

        async function deleteRoom(id) {
            if (!confirm('Xác nhận xóa phòng này?')) return;
            try {
                const headers = getHeaders();
                const response = await fetch(`${BASE_URL}/rooms/${id}`, { method: 'DELETE', headers });
                if (!response.ok) throw new Error('Không xóa được');
                loadData();
                alert('✅ Xóa thành công!');
            } catch (e) {
                alert('❌ Lỗi xóa: ' + e.message);
            }
        }

        async function loadRoomOptions() {
            const res = await fetch(`${BASE_URL}/rooms`);
            if (!res.ok) throw new Error('Không tải được phòng');
            const rooms = await res.json();
            window.roomsCache = rooms;
            return rooms;
        }

        async function loadServicesForRoomForm() {
            try {
                const response = await fetch(`${BASE_URL}/services`);
                if (!response.ok) throw new Error('Không tải được dịch vụ');
                const services = await response.json();
                
                // Store services globally for calculation
                window.availableServices = services;
                
                const servicesList = document.getElementById('services-list');
                if (services.length === 0) {
                    servicesList.innerHTML = '<p style="color: #7f8c8d; margin: 0;">Chưa có dịch vụ nào. Hãy thêm dịch vụ trước!</p>';
                    return;
                }
                
                servicesList.innerHTML = services.map(s => `
                    <label style="display: block; margin-bottom: 8px; padding: 8px; border: 1px solid #eee; border-radius: 5px; background: #f9f9f9;">
                        <input type="checkbox" name="roomServices" value="${s._id}" data-price="${s.price}" style="margin-right: 8px;">
                        <strong>${s.name}</strong> - ${Number(s.price).toLocaleString()} đ/${s.unit}
                    </label>
                `).join('');
                
                // Attach event listeners to checkboxes
                servicesList.querySelectorAll('input[name="roomServices"]').forEach(checkbox => {
                    checkbox.addEventListener('change', updateTotalPreview);
                });
                
                // Initial calculation
                updateTotalPreview();
            } catch (error) {
                console.error('Lỗi tải dịch vụ:', error);
                document.getElementById('services-list').innerHTML = '<p style="color: #e74c3c; margin: 0;">❌ Không thể tải danh sách dịch vụ</p>';
            }
        }

        function updateTotalPreview() {
            const roomPrice = Number(document.getElementById('prc').value) || 0;
            let total = roomPrice;
            
            // Add selected services
            const checkedBoxes = document.querySelectorAll('input[name="roomServices"]:checked');
            checkedBoxes.forEach(checkbox => {
                const service = window.availableServices?.find(s => s._id === checkbox.value);
                if (service) {
                    total += Number(service.price);
                } else {
                    total += Number(checkbox.dataset.price || 0);
                }
            });
            
            // Update display
            const totalElement = document.getElementById('total-amount');
            const previewElement = document.getElementById('total-preview');
            
            if (totalElement && previewElement) {
                totalElement.textContent = total.toLocaleString() + ' đ';
                previewElement.style.display = total > 0 ? 'block' : 'none';
            }
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function closeDetail() {
            document.getElementById('detailModal').style.display = 'none';
        }

        document.addEventListener('click', (e) => {
            const modal = document.getElementById('modal');
            if (e.target === modal) closeModal();
            const detailModal = document.getElementById('detailModal');
            if (e.target === detailModal) closeDetail();
            const loginModal = document.getElementById('loginModal');
            if (e.target === loginModal) closeLoginModal();
        });
    </script>
</body>
